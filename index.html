<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8085 Advanced Simulator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap');
        @import url('https://fonts.cdnfonts.com/css/dseg7-classic');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-main: #050606; --panel-bg: #121514;
            --btn-blue: #1a73e8; --btn-dark: #202124; --btn-orange: #d94e18;
            --text-neon: #ff2e2e; --status-gold: #ffcc00; --text-dim: #888;
        }

        body {
            background-color: var(--bg-main); color: white;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: stretch;
            height: 100vh; width: 100vw; margin: 0; padding: clamp(5px, 1vw, 15px);
            overflow: hidden; gap: 15px;
        }

        /* --- LEFT: HARDWARE TRAINER --- */
        .trainer-case {
            background-color: var(--panel-bg); padding: clamp(10px, 2vw, 20px);
            border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            border: 1px solid #2a2a2a; display: flex; flex-direction: column;
            gap: 12px; width: 100%; max-width: 600px; flex-shrink: 0;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .top-btn-group { display: flex; gap: 8px; }
        .top-btn {
            background: #1e1e1e; color: #aaa; border: 1px solid #333;
            padding: 6px 10px; border-radius: 4px; font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .top-btn:active, .top-btn:hover { background: #333; color: white; }
        .clear-btn { color: #ff5252; background: #2a0e0e; }

        .display-section {
            background: #000; height: 100px; border-radius: 8px; border: 2px solid #333;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }
        .led-digits {
            font-family: 'DSEG7 Classic', monospace; color: var(--text-neon);
            font-size: 42px; letter-spacing: 5px; text-shadow: 0 0 15px rgba(255, 46, 46, 0.6);
            white-space: pre;
        }

        .status-hud {
            background: rgba(0,0,0,0.3); border: 1px solid #333; padding: 8px;
            border-radius: 4px; text-align: center; color: var(--status-gold);
            font-family: 'JetBrains Mono', monospace; font-size: 12px;
        }

        .keypads { display: flex; gap: 12px; flex-grow: 1; }
        .grid { display: grid; gap: 8px; flex: 1; grid-auto-rows: 1fr; }
        .grid-blue { grid-template-columns: repeat(3, 1fr); }
        .grid-hex { grid-template-columns: repeat(4, 1fr); }

        .btn {
            border: none; border-radius: 6px; color: white; font-weight: 700;
            font-size: 16px; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.1s;
        }
        .btn:active { transform: translateY(2px); filter: brightness(1.2); }
        .btn span { font-size: 10px; opacity: 0.7; margin-top: 2px; }
        .btn-blue { background: var(--btn-blue); box-shadow: 0 4px 0 #0d47a1; }
        .btn-dark { background: var(--btn-dark); box-shadow: 0 4px 0 #000; }
        .btn-orange { background: var(--btn-orange); box-shadow: 0 4px 0 #8c320f; }
        .btn-step { background: #2e7d32; box-shadow: 0 4px 0 #1b5e20; } /* New Step Btn */

        /* --- RIGHT: TELEMETRY DASHBOARD --- */
        .telemetry-panel {
            background-color: var(--panel-bg); border-radius: 12px; border: 1px solid #2a2a2a;
            display: flex; flex-direction: column; flex-grow: 1; max-width: 500px;
            padding: 15px; font-family: 'JetBrains Mono', monospace; gap: 15px;
            overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        @media (max-width: 900px) { body { flex-direction: column; overflow-y: auto; height: auto;} .telemetry-panel { max-width: 100%;} }

        .panel-title { color: #fff; font-size: 14px; font-weight: 700; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        
        /* Registers Grid */
        .reg-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .reg-box { background: #000; border: 1px solid #333; border-radius: 4px; padding: 8px; text-align: center; }
        .reg-label { color: var(--text-dim); font-size: 11px; margin-bottom: 4px; }
        .reg-val { color: #4fc3f7; font-size: 16px; font-weight: 700; }
        .reg-val.pc { color: #fbc02d; }
        .reg-val.sp { color: #ff8a65; }

        /* Flags */
        .flags-grid { display: flex; justify-content: space-between; background: #000; border: 1px solid #333; padding: 10px; border-radius: 4px; }
        .flag { text-align: center; }
        .flag-on { color: #69f0ae; font-weight: 700; }
        .flag-off { color: #555; }

        /* Memory Dump */
        .mem-inspector { flex-grow: 1; background: #000; border: 1px solid #333; border-radius: 4px; padding: 10px; overflow-y: auto; font-size: 13px; max-height: 250px;}
        .mem-row { display: flex; gap: 15px; padding: 2px 0; }
        .mem-addr { color: var(--text-dim); }
        .mem-data { color: #fff; letter-spacing: 2px; }
        .mem-highlight { background: rgba(26, 115, 232, 0.3); color: white;}

        /* Assembler Input */
        .assembler-box { display: flex; flex-direction: column; gap: 8px; }
        textarea { background: #000; color: #fff; border: 1px solid #333; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; border-radius: 4px; resize: vertical; height: 100px; }
        .btn-assemble { background: var(--btn-blue); color: white; border: none; padding: 8px; border-radius: 4px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="trainer-case">
    <div class="top-bar">
        <div class="top-btn-group">
            <button class="top-btn clear-btn" onclick="clearAll()">CLEAR RAM</button>
            <button class="top-btn" onclick="hardReset()">HARD RESET</button>
        </div>
        <div class="top-btn-group">
            <span style="font-family: 'JetBrains Mono'; font-size: 12px; color: #aaa;">T-States: <span id="t-states" style="color: #ffcc00;">0</span></span>
        </div>
    </div>

    <div class="display-section">
        <div class="led-digits" id="main-led">- 5Cb 85</div>
    </div>

    <div class="status-hud" id="hud">SYSTEM READY - EXMEM TO EDIT</div>

    <div class="keypads">
        <div class="grid grid-blue">
            <button class="btn btn-blue" onclick="op('RESET')">RESET</button>
            <button class="btn btn-blue" onclick="op('VCT_INT')">VCT<br>INT</button>
            <button class="btn btn-blue" onclick="op('SHIFT')">SHIFT</button>
            
            <button class="btn btn-blue" onclick="op('EXREG', 'SI')">EXREG<br><span>SI</span></button>
            <button class="btn btn-step" onclick="op('STEP')">STEP<br><span>DEBUG</span></button>
            <button class="btn btn-blue" onclick="op('DEL', 'DATA_DEL')">DEL<br><span>DATA</span></button>
            
            <button class="btn btn-blue" onclick="op('GO')">GO</button>
            <button class="btn btn-blue" onclick="op('BM')">B.M</button>
            <button class="btn btn-blue" onclick="op('REL', 'EXMEM')">REL<br><span>EXMEM</span></button>
            
            <button class="btn btn-blue" onclick="op('STRING', 'PRE')">STRING<br><span>PRE</span></button>
            <button class="btn btn-blue" onclick="op('MEMC', 'NEXT')">MEMC<br><span>NEXT</span></button>
            <button class="btn btn-orange" onclick="op('FILL', 'EXEC')">FILL<br><span>EXEC</span></button>
        </div>

        <div class="grid grid-hex">
            <button class="btn btn-dark" onclick="hex('C')">C</button>
            <button class="btn btn-dark" onclick="hex('D')">D</button>
            <button class="btn btn-dark" onclick="hex('E')">E</button>
            <button class="btn btn-dark" onclick="hex('F')">F</button>
            <button class="btn btn-dark" onclick="hex('8')">8<br><span>H</span></button>
            <button class="btn btn-dark" onclick="hex('9')">9<br><span>L</span></button>
            <button class="btn btn-dark" onclick="hex('A')">A</button>
            <button class="btn btn-dark" onclick="hex('B')">B</button>
            <button class="btn btn-dark" onclick="hex('4')">4<br><span>PCH</span></button>
            <button class="btn btn-dark" onclick="hex('5')">5<br><span>PCL</span></button>
            <button class="btn btn-dark" onclick="hex('6')">6<br><span>SPH</span></button>
            <button class="btn btn-dark" onclick="hex('7')">7<br><span>SPL</span></button>
            <button class="btn btn-dark" onclick="hex('0')">0</button>
            <button class="btn btn-dark" onclick="hex('1')">1</button>
            <button class="btn btn-dark" onclick="hex('2')">2</button>
            <button class="btn btn-dark" onclick="hex('3')">3</button>
        </div>
    </div>
</div>

<div class="telemetry-panel">
    
    <div>
        <div class="panel-title">REGISTERS & FLAGS</div>
        <div class="reg-grid" style="margin-bottom: 10px;">
            <div class="reg-box"><div class="reg-label">A (Accumulator)</div><div class="reg-val" id="reg-A">00</div></div>
            <div class="reg-box"><div class="reg-label">B</div><div class="reg-val" id="reg-B">00</div></div>
            <div class="reg-box"><div class="reg-label">C</div><div class="reg-val" id="reg-C">00</div></div>
            <div class="reg-box"><div class="reg-label">D</div><div class="reg-val" id="reg-D">00</div></div>
            <div class="reg-box"><div class="reg-label">E</div><div class="reg-val" id="reg-E">00</div></div>
            <div class="reg-box"><div class="reg-label">H</div><div class="reg-val" id="reg-H">00</div></div>
            <div class="reg-box"><div class="reg-label">L</div><div class="reg-val" id="reg-L">00</div></div>
            <div class="reg-box"><div class="reg-label">M (Memory)</div><div class="reg-val" id="reg-M">00</div></div>
        </div>
        <div class="reg-grid" style="margin-bottom: 10px; grid-template-columns: 1fr 1fr;">
            <div class="reg-box"><div class="reg-label">PC (Program Counter)</div><div class="reg-val pc" id="reg-PC">2000</div></div>
            <div class="reg-box"><div class="reg-label">SP (Stack Pointer)</div><div class="reg-val sp" id="reg-SP">FFFF</div></div>
        </div>
        <div class="flags-grid">
            <div class="flag"><div class="reg-label">Sign</div><div id="flg-S" class="flag-off">0</div></div>
            <div class="flag"><div class="reg-label">Zero</div><div id="flg-Z" class="flag-off">0</div></div>
            <div class="flag"><div class="reg-label">Aux Carry</div><div id="flg-AC" class="flag-off">0</div></div>
            <div class="flag"><div class="reg-label">Parity</div><div id="flg-P" class="flag-off">0</div></div>
            <div class="flag"><div class="reg-label">Carry</div><div id="flg-CY" class="flag-off">0</div></div>
        </div>
    </div>

    <div style="display: flex; flex-direction: column; flex-grow: 1;">
        <div class="panel-title">MEMORY INSPECTOR (2000 - 204F)</div>
        <div class="mem-inspector" id="mem-dump"></div>
    </div>

    <div class="assembler-box">
        <div class="panel-title">QUICK ASSEMBLER</div>
        <textarea id="asm-input" placeholder="Type mnemonics here (e.g., MVI A, 05)&#10;ADD B&#10;HLT"></textarea>
        <button class="btn-assemble" onclick="assemble()">Compile & Load to RAM</button>
    </div>
</div>

<script>
    // --- SYSTEM ARCHITECTURE ---
    let ram = new Uint8Array(65536);
    let cpu = { a:0, b:0, c:0, d:0, e:0, h:0, l:0, pc:0x2000, sp:0xFFFF, f:0, t:0, halted:false };
    let state = "BOOT"; let addrBuffer = ""; let dataBuffer = ""; let currentAddr = 0x2000; let currentReg = ""; let isShifted = false;

    // Load RAM from LocalStorage
    if(localStorage.getItem('8085_ram')) {
        let saved = atob(localStorage.getItem('8085_ram'));
        for(let i=0; i<saved.length; i++) ram[i] = saved.charCodeAt(i);
    }
    const saveRAM = () => { localStorage.setItem('8085_ram', btoa(String.fromCharCode.apply(null, ram))); };

    // --- CPU FLAG HELPERS (Hardware Accurate) ---
    // F format: S(7) Z(6) x(5) AC(4) x(3) P(2) 1(1) CY(0)
    cpu.f = 0x02; // Bit 1 is always 1
    const setF = (mask, val) => { if(val) cpu.f |= mask; else cpu.f &= ~mask; };
    const getF = (mask) => (cpu.f & mask) ? 1 : 0;
    
    const updateSZP = (val) => {
        setF(0x80, val & 0x80); // Sign
        setF(0x40, val === 0);  // Zero
        let p = 0; for(let i=0; i<8; i++) p += (val>>i)&1;
        setF(0x04, p % 2 === 0); // Parity
    };

    // --- OPCODE DISPATCH ARCHITECTURE ---
    const inst = new Array(256).fill(() => { console.warn(`NOP/Unimplemented at ${cpu.pc.toString(16)}`); cpu.pc++; cpu.t+=4; });

    // Register maps
    const rMap = [ () => cpu.b, () => cpu.c, () => cpu.d, () => cpu.e, () => cpu.h, () => cpu.l, () => ram[(cpu.h<<8)|cpu.l], () => cpu.a ];
    const wMap = [ (v) => cpu.b=v, (v) => cpu.c=v, (v) => cpu.d=v, (v) => cpu.e=v, (v) => cpu.h=v, (v) => cpu.l=v, (v) => {ram[(cpu.h<<8)|cpu.l]=v; saveRAM();}, (v) => cpu.a=v ];
    const rpGet = [ () => (cpu.b<<8)|cpu.c, () => (cpu.d<<8)|cpu.e, () => (cpu.h<<8)|cpu.l, () => cpu.sp ];
    const rpSet = [ (v) => {cpu.b=v>>8; cpu.c=v&0xFF;}, (v) => {cpu.d=v>>8; cpu.e=v&0xFF;}, (v) => {cpu.h=v>>8; cpu.l=v&0xFF;}, (v) => cpu.sp=v ];

    // Generate MOV (0x40 - 0x7F)
    for(let i=0x40; i<=0x7F; i++) {
        if(i === 0x76) { inst[i] = () => { cpu.halted = true; cpu.pc++; }; continue; } // HLT
        let dest = (i>>3)&7; let src = i&7;
        inst[i] = () => { wMap[dest](rMap[src]()); cpu.pc++; cpu.t += (dest===6||src===6)?7:4; };
    }

    // Generate MVI (0x06, 0x0E...)
    for(let dest=0; dest<8; dest++) {
        inst[0x06 | (dest<<3)] = () => { wMap[dest](ram[cpu.pc+1]); cpu.pc+=2; cpu.t += (dest===6)?10:7; };
    }

    // Arithmetic Generation
    const doALU = (type, val) => {
        let res;
        if(type===0) { res = cpu.a + val; setF(0x10, (cpu.a&0xF)+(val&0xF)>0xF); setF(0x01, res>0xFF); cpu.a = res&0xFF; } // ADD
        else if(type===1) { res = cpu.a + val + getF(0x01); setF(0x10, (cpu.a&0xF)+(val&0xF)+getF(0x01)>0xF); setF(0x01, res>0xFF); cpu.a = res&0xFF; } // ADC
        else if(type===2) { res = cpu.a - val; setF(0x01, res<0); cpu.a = res&0xFF; } // SUB
        else if(type===3) { res = cpu.a - val - getF(0x01); setF(0x01, res<0); cpu.a = res&0xFF; } // SBB
        else if(type===4) { cpu.a &= val; setF(0x01, 0); } // ANA
        else if(type===5) { cpu.a ^= val; setF(0x01, 0); } // XRA
        else if(type===6) { cpu.a |= val; setF(0x01, 0); } // ORA
        else if(type===7) { res = cpu.a - val; setF(0x01, res<0); updateSZP(res&0xFF); return; } // CMP (No accumulator save)
        updateSZP(cpu.a);
    };

    // ALU Reg (0x80 - 0xBF)
    for(let i=0x80; i<=0xBF; i++) {
        let type = (i>>3)&7; let src = i&7;
        inst[i] = () => { doALU(type, rMap[src]()); cpu.pc++; cpu.t += (src===6)?7:4; };
    }

    // ALU Immediate (C6, CE, D6, DE...)
    const aluImm = [0xC6, 0xCE, 0xD6, 0xDE, 0xE6, 0xEE, 0xF6, 0xFE];
    for(let type=0; type<8; type++) {
        inst[aluImm[type]] = () => { doALU(type, ram[cpu.pc+1]); cpu.pc+=2; cpu.t+=7; };
    }

    // 16-bit Ops
    for(let p=0; p<4; p++) {
        inst[0x01 | (p<<4)] = () => { rpSet[p](ram[cpu.pc+1] | (ram[cpu.pc+2]<<8)); cpu.pc+=3; cpu.t+=10; }; // LXI
        inst[0x03 | (p<<4)] = () => { rpSet[p]((rpGet[p]() + 1) & 0xFFFF); cpu.pc++; cpu.t+=6; }; // INX
        inst[0x0B | (p<<4)] = () => { rpSet[p]((rpGet[p]() - 1 + 0x10000) & 0xFFFF); cpu.pc++; cpu.t+=6; }; // DCX
        inst[0x09 | (p<<4)] = () => { let res = rpGet[2]() + rpGet[p](); setF(0x01, res>0xFFFF); rpSet[2](res&0xFFFF); cpu.pc++; cpu.t+=10; }; // DAD
    }

    // Accumulator Specifics
    inst[0x2F] = () => { cpu.a = (~cpu.a) & 0xFF; cpu.pc++; cpu.t+=4; }; // CMA (2s Complement Fix)
    inst[0x37] = () => { setF(0x01, 1); cpu.pc++; cpu.t+=4; }; // STC
    inst[0x3F] = () => { setF(0x01, !getF(0x01)); cpu.pc++; cpu.t+=4; }; // CMC
    inst[0x27] = () => { // DAA
        let val = cpu.a;
        if((val & 0x0F) > 9 || getF(0x10)) { val += 0x06; setF(0x10, (cpu.a&0x0F)+6 > 0x0F); }
        if((val & 0xF0) > 0x90 || getF(0x01)) { val += 0x60; setF(0x01, 1); }
        cpu.a = val & 0xFF; updateSZP(cpu.a); cpu.pc++; cpu.t+=4;
    };

    // Jumps & Calls
    const jumpLogic = (cond) => { let trg = ram[cpu.pc+1] | (ram[cpu.pc+2]<<8); if(cond) { cpu.pc = trg; cpu.t+=10; } else { cpu.pc+=3; cpu.t+=7; } };
    inst[0xC3] = () => { cpu.pc = ram[cpu.pc+1] | (ram[cpu.pc+2]<<8); cpu.t+=10; }; // JMP
    inst[0xCA] = () => jumpLogic(getF(0x40)); // JZ
    inst[0xC2] = () => jumpLogic(!getF(0x40)); // JNZ
    inst[0xDA] = () => jumpLogic(getF(0x01)); // JC
    inst[0xD2] = () => jumpLogic(!getF(0x01)); // JNC

    // Indirect Loading/Storing
    inst[0x3A] = () => { cpu.a = ram[ram[cpu.pc+1]|(ram[cpu.pc+2]<<8)]; cpu.pc+=3; cpu.t+=13; }; // LDA
    inst[0x32] = () => { ram[ram[cpu.pc+1]|(ram[cpu.pc+2]<<8)] = cpu.a; saveRAM(); cpu.pc+=3; cpu.t+=13; }; // STA
    inst[0x2A] = () => { let ad=ram[cpu.pc+1]|(ram[cpu.pc+2]<<8); cpu.l=ram[ad]; cpu.h=ram[ad+1]; cpu.pc+=3; cpu.t+=16; }; // LHLD
    inst[0x22] = () => { let ad=ram[cpu.pc+1]|(ram[cpu.pc+2]<<8); ram[ad]=cpu.l; ram[ad+1]=cpu.h; saveRAM(); cpu.pc+=3; cpu.t+=16; }; // SHLD
    inst[0x0A] = () => { cpu.a = ram[rpGet[0]()]; cpu.pc++; cpu.t+=7; }; // LDAX B
    inst[0x1A] = () => { cpu.a = ram[rpGet[1]()]; cpu.pc++; cpu.t+=7; }; // LDAX D
    inst[0x02] = () => { ram[rpGet[0]()] = cpu.a; saveRAM(); cpu.pc++; cpu.t+=7; }; // STAX B
    inst[0x12] = () => { ram[rpGet[1]()] = cpu.a; saveRAM(); cpu.pc++; cpu.t+=7; }; // STAX D

    // --- TELEMETRY & UI UPDATES ---
    const hexF = (val, pad) => val.toString(16).toUpperCase().padStart(pad, '0');
    
    function updateTelemetry() {
        document.getElementById('reg-A').innerText = hexF(cpu.a, 2);
        document.getElementById('reg-B').innerText = hexF(cpu.b, 2);
        document.getElementById('reg-C').innerText = hexF(cpu.c, 2);
        document.getElementById('reg-D').innerText = hexF(cpu.d, 2);
        document.getElementById('reg-E').innerText = hexF(cpu.e, 2);
        document.getElementById('reg-H').innerText = hexF(cpu.h, 2);
        document.getElementById('reg-L').innerText = hexF(cpu.l, 2);
        document.getElementById('reg-M').innerText = hexF(ram[(cpu.h<<8)|cpu.l] || 0, 2);
        document.getElementById('reg-PC').innerText = hexF(cpu.pc, 4);
        document.getElementById('reg-SP').innerText = hexF(cpu.sp, 4);
        
        const setFlagUI = (id, mask) => {
            let el = document.getElementById(id);
            if(getF(mask)) { el.className = 'flag-on'; el.innerText = '1'; }
            else { el.className = 'flag-off'; el.innerText = '0'; }
        };
        setFlagUI('flg-S', 0x80); setFlagUI('flg-Z', 0x40); setFlagUI('flg-AC', 0x10);
        setFlagUI('flg-P', 0x04); setFlagUI('flg-CY', 0x01);

        document.getElementById('t-states').innerText = cpu.t;

        // Render Memory Dump
        let memHtml = '';
        let startDump = Math.max(0x2000, Math.floor(cpu.pc / 16) * 16 - 32); 
        for(let i=startDump; i<startDump+80; i+=8) {
            let row = `<div class="mem-row"><div class="mem-addr">${hexF(i, 4)}</div><div class="mem-data">`;
            for(let j=0; j<8; j++) {
                let hClass = (i+j === cpu.pc) ? 'mem-highlight' : '';
                row += `<span class="${hClass}">${hexF(ram[i+j], 2)} </span>`;
            }
            memHtml += `</div></div>`;
        }
        document.getElementById('mem-dump').innerHTML = memHtml;
    }

    function updateHardwareUI() {
        const led = document.getElementById('main-led');
        const hud = document.getElementById('hud');
        if (state === "BOOT") { led.innerText = "- 5Cb 85"; hud.innerText = "SYSTEM READY"; }
        else if (state === "ADDR_WAIT") { led.innerText = (addrBuffer.padEnd(4, "-")) + "  ."; hud.innerText = "ENTER MEMORY ADDRESS"; }
        else if (state === "GO_WAIT") { led.innerText = (addrBuffer.padEnd(4, "-")) + "  ."; hud.innerText = "ENTER START ADDRESS + EXECUTE"; }
        else if (state === "DATA_EDIT") {
            let a = hexF(currentAddr, 4);
            let d = dataBuffer !== "" ? dataBuffer.padStart(2, "0") : hexF(ram[currentAddr], 2);
            led.innerText = `${a}  ${d}`; hud.innerText = `EDITING MEMORY`;
        }
        updateTelemetry();
    }

    // --- KEYPAD INPUT MAPPING ---
    function hex(v) {
        if (state === "ADDR_WAIT" || state === "GO_WAIT") {
            addrBuffer += v; if (addrBuffer.length > 4) addrBuffer = addrBuffer.slice(-4);
        } else if (state === "DATA_EDIT") {
            dataBuffer += v; if (dataBuffer.length > 2) dataBuffer = dataBuffer.slice(-2);
            ram[currentAddr] = parseInt(dataBuffer, 16); saveRAM();
        }
        updateHardwareUI();
    }

    function op(cmd, alt) {
        if (cmd === 'RESET') { state = "BOOT"; addrBuffer = ""; dataBuffer = ""; }
        else if (cmd === 'EXMEM' || cmd === 'REL') { state = "ADDR_WAIT"; addrBuffer = ""; }
        else if (cmd === 'NEXT' || cmd === 'MEMC') {
            if (state === "ADDR_WAIT") { currentAddr = parseInt(addrBuffer || "2000", 16); state = "DATA_EDIT"; dataBuffer = ""; }
            else if (state === "DATA_EDIT") { currentAddr = (currentAddr + 1) & 0xFFFF; dataBuffer = ""; }
        }
        else if (cmd === 'GO') { state = "GO_WAIT"; addrBuffer = ""; }
        else if (cmd === 'EXEC' || cmd === 'FILL') { 
            if (state === "GO_WAIT") {
                cpu.pc = parseInt(addrBuffer || "2000", 16); cpu.halted = false; cpu.t = 0;
                let failsafe = 0;
                while(!cpu.halted && failsafe < 500000) { inst[ram[cpu.pc]](); failsafe++; }
                state = "BOOT"; updateHardwareUI();
            }
        }
        else if (cmd === 'STEP') {
            if(state === "GO_WAIT") { cpu.pc = parseInt(addrBuffer || "2000", 16); cpu.halted = false; cpu.t=0; state="DEBUG"; }
            if(!cpu.halted) inst[ram[cpu.pc]]();
        }
        updateHardwareUI();
    }

    function hardReset() { cpu={a:0,b:0,c:0,d:0,e:0,h:0,l:0,pc:0x2000,sp:0xFFFF,f:0x02,t:0,halted:false}; op('RESET'); }
    function clearAll() { ram.fill(0); saveRAM(); hardReset(); }

    // --- MINI ASSEMBLER (Text to Hex) ---
    function assemble() {
        const dict = { "NOP":0x00, "HLT":0x76, "CMA":0x2F, "STC":0x37, "CMC":0x3F, "DAA":0x27, 
            "ADD B":0x80, "ADD C":0x81, "ADD D":0x82, "ADD E":0x83, "ADD H":0x84, "ADD L":0x85, "ADD M":0x86, "ADD A":0x87,
            "SUB B":0x90, "SUB C":0x91, "SUB D":0x92, "SUB E":0x93, "SUB H":0x94, "SUB L":0x95, "SUB M":0x96, "SUB A":0x97,
            "CMP B":0xB8, "CMP C":0xB9, "CMP D":0xBA, "CMP E":0xBB, "CMP H":0xBC, "CMP L":0xBD, "CMP M":0xBE, "CMP A":0xBF,
            "INX B":0x03, "INX D":0x13, "INX H":0x23, "INX SP":0x33, "DCX B":0x0B, "DCX D":0x1B, "DCX H":0x2B, "DCX SP":0x3B,
            "DAD B":0x09, "DAD D":0x19, "DAD H":0x29, "DAD SP":0x39 };
        
        let lines = document.getElementById('asm-input').value.toUpperCase().split('\n');
        let ptr = 0x2000;
        
        for(let line of lines) {
            line = line.trim(); if(!line) continue;
            if(dict[line] !== undefined) { ram[ptr++] = dict[line]; continue; }
            
            // Regex for MVI, LXI, Jumps
            let m;
            if((m = line.match(/^MVI ([A-EHLM]),\s*([0-9A-F]{2})H?$/))) {
                const regs = {'B':0,'C':1,'D':2,'E':3,'H':4,'L':5,'M':6,'A':7};
                ram[ptr++] = 0x06 | (regs[m[1]]<<3); ram[ptr++] = parseInt(m[2], 16);
            }
            else if((m = line.match(/^(JMP|JZ|JNZ|JC|JNC)\s+([0-9A-F]{4})H?$/))) {
                const jmap = {"JMP":0xC3, "JZ":0xCA, "JNZ":0xC2, "JC":0xDA, "JNC":0xD2};
                ram[ptr++] = jmap[m[1]]; let ad = parseInt(m[2], 16);
                ram[ptr++] = ad & 0xFF; ram[ptr++] = ad >> 8;
            }
            else if((m = line.match(/^STA\s+([0-9A-F]{4})H?$/))) { let ad=parseInt(m[1],16); ram[ptr++]=0x32; ram[ptr++]=ad&0xFF; ram[ptr++]=ad>>8; }
            else if((m = line.match(/^LDA\s+([0-9A-F]{4})H?$/))) { let ad=parseInt(m[1],16); ram[ptr++]=0x3A; ram[ptr++]=ad&0xFF; ram[ptr++]=ad>>8; }
        }
        saveRAM(); updateHardwareUI(); alert("Assembled to 2000H. Press GO -> 2000 -> EXEC");
    }

    // Init
    updateHardwareUI();
</script>
